<script type="text/javascript">//<![CDATA[
(function(window, undef){
"use strict";

(function() {
/**
 * Provides requestAnimationFrame in a cross browser way.
 * http://paulirish.com/2011/requestanimationframe-for-smart-animating/
 */
if (!window.requestAnimationFrame)
{
    window.requestAnimationFrame = (window.webkitRequestAnimationFrame ||
        window.mozRequestAnimationFrame ||
        window.oRequestAnimationFrame ||
        window.msRequestAnimationFrame ||
        function(callback, element) {window.setTimeout(callback, 1000 / 60);})
    ;
    window.cancelAnimationFrame = (window.webkitCancelAnimationFrame ||
        window.mozCancelAnimationFrame ||
        window.oCancelAnimationFrame ||
        window.msCancelAnimationFrame ||
        function(timer) {window.clearTimeout(timer);})
    ;
}
})();

function hasEventOptions()
{
    if (null == hasEventOptions.supported)
    {
        var passiveSupported = false, options = {};
        try {
            Object.defineProperty(options, 'passive', {
                get: function(){
                    passiveSupported = true;
                    return false;
                }
            });
            window.addEventListener('test', null, options);
            window.removeEventListener('test', null, options);
        } catch(e) {
            passiveSupported = false;
        }
        hasEventOptions.supported = passiveSupported;
    }
    return hasEventOptions.supported;
}
function addEvent(el, event, handler, options)
{
    if (el)
    {
        if (el.attachEvent) el.attachEvent('on' + event, handler);
        else el.addEventListener(event, handler, hasEventOptions() ? options : ((null != options) && ("object" === typeof options) ? !!options.capture : !!options));
    }
    return el;
}
function removeEvent(el, event, handler, options)
{
    if (el)
    {
        if (el.detachEvent) el.detachEvent('on' + event, handler);
        else el.removeEventListener(event, handler, hasEventOptions() ? options : ((null != options) && ("object" === typeof options) ? !!options.capture : !!options));
    }
    return el;
}
function recursive_offset(node)
{
    var x = 0, y = 0, nodeStyle;

    while (node)
    {
        try {
            nodeStyle = window.getComputedStyle(node);
        } catch(e) {
            nodeStyle = null;
        }
        if (node.scrollLeft) x += node.scrollLeft;
        if (node.scrollTop) y += node.scrollTop;
        if (node.offsetLeft) x -= node.offsetLeft;
        if (node.offsetTop) y -= node.offsetTop;
        if (nodeStyle && nodeStyle.marginLeft) x -= parseInt(nodeStyle.marginLeft, 10);
        if (nodeStyle && nodeStyle.marginTop) y -= parseInt(nodeStyle.marginTop, 10);
        node = node.parentNode
    }
    return {x:x, y:y};
}

var stdMath = Math,
    container, scramblebt, undobt, newbt,
    flatimage, rubikN, camera, scene, renderer, rubikcube,

    w, h, w2, h2,
    targetRotationY = 0, targetRotationOnMouseDownY = 0,
    targetRotationX = 0, targetRotationOnMouseDownX = 0,
    rad = 500, mouse = {x:0, y:0},
    mouseX = 0, mouseXOnMouseDown = 0,
    mouseY = 0, mouseYOnMouseDown = 0,
    mouseX0 = mouseX, mouseY0 = mouseY,

    pressed_cubelet, released_cubelet,
    isCubeRotation = false,

    // mutually complementary colors
    colors = {
        inside: 0x2c2c2c,
        top: 0xFF00FF,
        bottom: 0x00FF00,
        left: 0xFFFF00,
        right: 0x0000FF,
        front: 0xFF0000,
        back: 0x00FFFF
    },

    multx = stdMath.PI/2, multy = -stdMath.PI
;

function updateflatimage()
{
    /*var flat =*/rubikcube.getFlatImage(flatimage);
}
function getCubelet(clientX, clientY)
{
    mouse.x = (clientX / w) * 2 - 1;
    mouse.y = -(clientY / h) * 2 + 1;
    return rubikcube.getCubelet(camera, mouse.x, mouse.y, true);
}
function onDocumentMouseDown(event)
{
    onDocumentDown(event, false);
}
function onDocumentTouchStart(event)
{
    onDocumentDown(event, true);
}
function onDocumentDown(event, isTouch)
{
    event.preventDefault();

    var clientX = isTouch ? event.touches[0].clientX : event.clientX,
        clientY = isTouch ? event.touches[0].clientY : event.clientY,
        offset, target;

    offset = recursive_offset(event.target);
    clientX += offset.x; clientY += offset.y;
    target = getCubelet(clientX, clientY);

    if (!target)
    {
        isCubeRotation = true;
        mouseX0 = mouseX = (clientX / w);
        mouseY0 = mouseY = (clientY / h);

        if (isTouch)
        {
            addEvent(container, 'touchmove', onDocumentTouchMove, {passive:false, capture:false});
            addEvent(container, 'touchend', onDocumentTouchEnd, {passive:false, capture:false});
            addEvent(container, 'touchcancel', onDocumentTouchEnd, {passive:false, capture:false});
        }
        else
        {
            addEvent(container, 'mousemove', onDocumentMouseMove, {passive:false, capture:false});
            addEvent(container, 'mouseup', onDocumentMouseUp, {passive:false, capture:false});
            addEvent(container, 'mouseout', onDocumentMouseOut, {passive:false, capture:false});
        }
    }
    else
    {
        isCubeRotation = false;
        if (!target.seenas) return;
        pressed_cubelet = target;

        if (isTouch)
        {
            //addEvent(container, 'touchmove', onDocumentTouchMove, {passive:false, capture:false});
            addEvent(container, 'touchend', onDocumentTouchEnd, {passive:false, capture:false});
            addEvent(container, 'touchcancel', onDocumentTouchEnd, {passive:false, capture:false});
        }
        else
        {
            //addEvent(container, 'mousemove', onDocumentMouseMove, {passive:false, capture:false});
            addEvent(container, 'mouseup', onDocumentMouseUp, {passive:false, capture:false});
            addEvent(container, 'mouseout', onDocumentMouseOut, {passive:false, capture:false});
        }
    }
}
function onDocumentMouseMove(event)
{
    onDocumentMove(event, false);
}
function onDocumentTouchMove(event)
{
    onDocumentMove(event, true);
}
function onDocumentMove(event, isTouch)
{
    var clientX = isTouch ? event.touches[0].clientX : event.clientX,
        clientY = isTouch ? event.touches[0].clientY : event.clientY,
        offset;

    if (isCubeRotation)
    {
        offset = recursive_offset(event.target);
        clientX += offset.x; clientY += offset.y;

        if (clientX > w || clientX < 0 || clientY > h || clientY < 0) return;
        mouseX = (clientX / w);
        mouseY = (clientY / h);
        targetRotationY += mouseX - mouseX0;
        targetRotationX += mouseY - mouseY0;
        mouseX0 = mouseX;
        mouseY0 = mouseY;
    }
    else
    {
        // do nothing
    }
}
function onDocumentMouseUp(event)
{
    onDocumentUp(event, false);
}
function onDocumentTouchEnd(event)
{
    onDocumentUp(event, true);
}
function onDocumentUp(event, isTouch)
{
    var clientX = isTouch ? event.touches[0].clientX : event.clientX,
        clientY = isTouch ? event.touches[0].clientY : event.clientY,
        offset;

    if (isCubeRotation)
    {
        isCubeRotation = false;
        if (isTouch)
        {
            removeEvent(container, 'touchmove', onDocumentTouchMove, {passive:false, capture:false});
            removeEvent(container, 'touchend', onDocumentTouchEnd, {passive:false, capture:false});
            removeEvent(container, 'touchcancel', onDocumentTouchEnd, {passive:false, capture:false});
        }
        else
        {
            removeEvent(container, 'mousemove', onDocumentMouseMove, {passive:false, capture:false});
            removeEvent(container, 'mouseup', onDocumentMouseUp, {passive:false, capture:false});
            removeEvent(container, 'mouseout', onDocumentMouseOut, {passive:false, capture:false});
        }
    }
    else
    {
        if (!pressed_cubelet) return;

        offset = recursive_offset(event.target);
        clientX += offset.x; clientY += offset.y;

        released_cubelet = getCubelet(clientX, clientY);
        if (!released_cubelet || !released_cubelet.seenas) return;

        var rotation = rubikcube.getRotation(pressed_cubelet, released_cubelet);
        if (rotation)
        {
            rotation.duration = 1;
            //rotation.onComplete = updateflatimage;
            rubikcube.rotate(rotation);
        }
        if (isTouch)
        {
            //removeEvent(container, 'touchmove', onDocumentTouchMove, {passive:false, capture:false});
            removeEvent(container, 'touchend', onDocumentTouchEnd, {passive:false, capture:false});
            removeEvent(container, 'touchcancel', onDocumentTouchEnd, {passive:false, capture:false});
        }
        else
        {
            //removeEvent(container, 'mousemove', onDocumentMouseMove, {passive:false, capture:false});
            removeEvent(container, 'mouseup', onDocumentMouseUp, {passive:false, capture:false});
            removeEvent(container, 'mouseout', onDocumentMouseOut, {passive:false, capture:false});
        }
    }
}
function onDocumentMouseOut(event)
{
    isCubeRotation = false;
    removeEvent(container, 'mousemove', onDocumentMouseMove, {passive:false, capture:false});
    removeEvent(container, 'mouseup', onDocumentMouseUp, {passive:false, capture:false});
    removeEvent(container, 'mouseout', onDocumentMouseOut, {passive:false, capture:false});
}
function animate()
{
    // sperical coordinate system for camera, with radius = rad
    camera.position.x = rad * stdMath.sin(targetRotationY * multy) * stdMath.cos(targetRotationX * multx);
    camera.position.y = rad * stdMath.sin(targetRotationX * multx);
    camera.position.z = rad * stdMath.cos(targetRotationY * multy) * stdMath.cos(targetRotationX * multx);
    camera.lookAt(scene.position);
    Tween.tick();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
function setDimensions()
{
    w = stdMath.min(window.innerWidth, 2000) - 20;
    h = stdMath.max(window.innerHeight - 150, 650);
    w2 = w / 2;
    h2 = h / 2;
    container.style.width = String(w) + "px";
    container.style.height = String(h) + "px";
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
}
var app = {
    init : function() {

        container = document.getElementById('container');
        newbt = document.getElementById('newrubik');
        scramblebt = document.getElementById('scramble');
        undobt = document.getElementById('undo');
        flatimage = document.getElementById('flatimage');
        rubikN = document.getElementById('rubik-type');

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, 1.0, 1, 1000);
        camera.position.z = rad;
        scene.add(camera);

        // Rubik Cube
        Rubik.Tween = window.Tween;
        rubikcube = new Rubik(rubikN.options[rubikN.selectedIndex || 0].value, 200, 0.1, colors);
        scene.add(rubikcube);
        rubikcube.onChange = updateflatimage;

        renderer = new THREE.CanvasRenderer();
        setDimensions();
        container.appendChild(renderer.domElement);

        addEvent(window, 'resize', setDimensions, false);
        addEvent(container, 'mousedown', onDocumentMouseDown, {passive:false, capture:false});
        addEvent(container, 'touchstart', onDocumentTouchStart, {passive:false, capture:false});
        addEvent(newbt, 'click', function() {
            if (rubikcube) scene.remove(rubikcube);
            rubikcube = new Rubik(rubikN.options[rubikN.selectedIndex || 0].value, 200, 0.1, colors);
            scene.add(rubikcube);
            rubikcube.onChange = updateflatimage;
            renderer.render(scene, camera);
            updateflatimage();
        }, false);
        addEvent(scramblebt, 'click', function() {
            rubikcube.scramble(10);
            updateflatimage();
        }, false);
        addEvent(undobt, 'click', function() {
            if (rubikcube.undo() == 'setRubikColors')
            {
                colors = {
                    front: rubikcube.rubik.colors.front,
                    back: rubikcube.rubik.colors.back,
                    left: rubikcube.rubik.colors.left,
                    right: rubikcube.rubik.colors.right,
                    top: rubikcube.rubik.colors.top,
                    bottom: rubikcube.rubik.colors.bottom,
                    inside: rubikcube.rubik.colors.inside
                };
                //updatecolors();
            }
        }, false);

        // after render works
        renderer.render(scene, camera);
        updateflatimage();
        requestAnimationFrame(animate);
    }
};
// go
app.init();
})(window);
//]]></script>
